name: Build & deploy plugin

# - Every push to main and every v* tag builds a distributable plugin zip
#   (uploaded as a downloadable artifact).
# - Every v* tag (or a manual run) ALSO deploys to the WordPress.org plugin
#   SVN repository via 10up/action-wordpress-plugin-deploy. The deploy
#   respects .distignore, reads the version from readme.txt "Stable tag",
#   and syncs .wordpress-org/ to the SVN assets/ dir (banner, icon,
#   screenshots). Requires repository secrets SVN_USERNAME and SVN_PASSWORD
#   (the reloom account's SVN credentials from WordPress.org).
#
# NOTE: unlike our other plugins, vendor/ SHIPS — Dompdf is bundled.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build zip
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          HEADER_VERSION="$(grep -E '^\s*\*\s*Version:' reloom-human-design.php | head -1 | sed -E 's/.*Version:[[:space:]]*([0-9.]+).*/\1/')"
          if [ "${GITHUB_REF_TYPE:-branch}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${HEADER_VERSION}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved version=${VERSION}"

      - name: Create plugin zip
        run: |
          zip -r reloom-human-design.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x '.wordpress-org/*' \
            -x '.claude/*' \
            -x '*.DS_Store' \
            -x '__MACOSX/*' \
            -x '.gitignore' \
            -x '.gitattributes' \
            -x '.distignore' \
            -x '.editorconfig' \
            -x '.env' \
            -x 'node_modules/*' \
            -x '*.zip'

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: reloom-human-design-${{ steps.version.outputs.VERSION }}-${{ github.sha }}
          path: reloom-human-design.zip
          retention-days: 90

  deploy:
    # Deploy to WordPress.org on v* tags, or when triggered manually.
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to WordPress.org
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: WordPress.org plugin deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: reloom-human-design

      - name: Upload deployed zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: wordpress-org-${{ github.ref_name }}
          path: ${{ github.workspace }}/reloom-human-design.zip
          retention-days: 90
